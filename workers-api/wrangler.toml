name = "fieldvibe-api"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "fieldvibe-db"
database_id = "placeholder-will-be-set-on-deploy"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "fieldvibe-uploads"

[placement]
mode = "smart"
